<!DOCTYPE html>
<html>
<head>
<title>MONITOR OS TV</title>

<style>
body{
  margin:0;
  font-family:Arial;
  overflow:hidden;
  position:relative;
  background:linear-gradient(135deg, #0f2027, #203a43, #2c5364);
}

/* WATERMARK */
body::before{
  content:"";
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  width:95%;
  height:95%;
  background:url('LOGO ONLY.png') no-repeat center;
  background-size:contain;
  opacity:0.1;
  z-index:0;
  pointer-events:none;
}

/* HEADER */
.header-top{
  height:80px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
  background:rgba(255,255,255,0.95);
  position:relative;
  z-index:2;
}

.header-left{
  display:flex;
  flex-direction:column;
}

.logo{ height:55px; }

.note{
  color:red;
  font-weight:bold;
  font-size:13px;
}

.header-center{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  font-weight:bold;
  font-size:20px;
  width:100%;
  text-align:center;
}

.clock-wrap{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
}

.clock{
  font-size:18px;
  font-weight:bold;
}

.timer-circle{
  width:50px;
  height:50px;
  border-radius:50%;
  background:#2c5364;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  font-size:16px;
  margin-top:5px;
}

/* MAIN */
.container-column{
  height:calc(100vh - 80px);
  display:flex;
  flex-direction:column;
}

.container{
  display:flex;
  gap:12px;
  padding:10px;
  height:50%;
}

/* PANEL */
.panel{
  flex:1;
  background:rgba(255,255,255,0.93);
  border-radius:14px;
  box-shadow:0 6px 15px rgba(0,0,0,0.25);
  display:flex;
  flex-direction:column;
  overflow:hidden;
  transition:0.3s;
}

.panel:hover{
  box-shadow:0 0 20px rgba(0,150,255,0.3);
}

.panel-title{
  text-align:center;
  font-weight:bold;
  padding:6px;
  font-size:13px;
  background:linear-gradient(90deg,#5a79a8,#3c5a7c);
  color:white;
}

.wrap{
  flex:1;
  overflow-y:auto;
}

.wrap::-webkit-scrollbar{width:6px;}
.wrap::-webkit-scrollbar-thumb{
  background:rgba(0,0,0,0.3);
  border-radius:10px;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
}

thead{
  position:sticky;
  top:0;
  z-index:10;
}

th, td{
  border:1px solid rgba(0,0,0,0.08);
  padding:4px;
  font-size:10px;
  background:rgba(255,255,255,0.92);
}

th{ color:white; }

.blue{ background:#5a79a8 !important; }
.red{ background:#d92c2c !important; }

.center{text-align:center;}
.left{text-align:left;}

.os{
  color:red;
  font-weight:bold;
}

tbody tr:hover{
  background:rgba(0,0,0,0.04);
  transition:0.2s;
}
</style>
</head>

<body>

<div class="header-top">
  <div class="header-left">
    <img src="HORIZONTAL.png" class="logo">
    <div class="note">HANYA YANG MASIH OS SAJA YANG MUNCUL DI LAYAR</div>
  </div>

  <div class="header-center">
    MONITORING OUTSTANDING PLAN LINE / WS 3B
  </div>

  <div class="clock-wrap">
    <div class="clock" id="clock"></div>
    <div class="timer-circle" id="timer">15</div>
  </div>
</div>

<div class="container-column">

  <div class="container">
    <div class="panel"><div class="panel-title" id="title1"></div><div class="wrap" id="wrap1"><table><thead id="head1"></thead><tbody id="data1"></tbody></table></div></div>
    <div class="panel"><div class="panel-title" id="title2"></div><div class="wrap" id="wrap2"><table><thead id="head2"></thead><tbody id="data2"></tbody></table></div></div>
    <div class="panel"><div class="panel-title" id="title3"></div><div class="wrap" id="wrap3"><table><thead id="head3"></thead><tbody id="data3"></tbody></table></div></div>
  </div>

  <div class="container">
    <div class="panel"><div class="panel-title" id="title4"></div><div class="wrap" id="wrap4"><table><thead id="head4"></thead><tbody id="data4"></tbody></table></div></div>
    <div class="panel"><div class="panel-title" id="title5"></div><div class="wrap" id="wrap5"><table><thead id="head5"></thead><tbody id="data5"></tbody></table></div></div>
    <div class="panel"><div class="panel-title" id="title6"></div><div class="wrap" id="wrap6"><table><thead id="head6"></thead><tbody id="data6"></tbody></table></div></div>
  </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwNp0RPSiV78MMPnMdhHQhQ8JJcWugWvWDDiC2W8eczeFKjJMxZcV68R9iFVGxxWYfB/exec";

const startedScroll = {};
let dataReady = false;

/* HEADER */
function header(){
  return `
  <tr>
    <th rowspan="2" class="blue">NO</th>
    <th rowspan="2" class="blue">NO PK</th>
    <th rowspan="2" class="blue">JENIS PROSES</th>
    <th colspan="2" class="blue">PLAN</th>
    <th rowspan="2" class="blue">TARGET SPK</th>
    <th rowspan="2" class="red">OS MARK</th>
    <th rowspan="2" class="red">OS QTY</th>
    <th rowspan="2" class="red">OS BERAT</th>
  </tr>
  <tr>
    <th class="blue">MULAI</th>
    <th class="blue">AKHIR</th>
  </tr>`;
}

function format(x){
  if(!x) return "";
  return Number(x).toLocaleString("id-ID");
}

function render(id, data){
  document.getElementById("head"+id).innerHTML = header();

  let html="";
  data.forEach(r=>{
    html+=`
    <tr>
      <td class="center">${r[0]}</td>
      <td class="left">${r[1]}</td>
      <td class="left">${r[2]}</td>
      <td class="center">${r[3]}</td>
      <td class="center">${r[4]}</td>
      <td class="center">${r[5]}</td>
      <td class="center os">${format(r[6])}</td>
      <td class="center os">${format(r[7])}</td>
      <td class="center os">${format(r[8])}</td>
    </tr>`;
  });

  document.getElementById("data"+id).innerHTML = html;

  if(!startedScroll[id]){
    autoScroll(id);
    startedScroll[id]=true;
  }
}

/* LOAD DATA SUPER CEPAT */
async function loadData(){
  dataReady = false;

  const res = await fetch(API_URL + "?t=" + new Date().getTime(), {
    cache: "no-store"
  });

  const result = await res.json();

  for(let i=1;i<=6;i++){
    document.getElementById("title"+i).innerText = result["title"+i] || "";
    render(i, result["meja"+i] || []);
  }

  dataReady = true;

  // reset timer saat data sudah ready
  timeLeft = duration;
}

setInterval(loadData, 5000);
loadData();

/* AUTO SCROLL */
function autoScroll(id){
  const el=document.getElementById("wrap"+id);

  let pause=false;

  el.addEventListener("mouseenter",()=>pause=true);
  el.addEventListener("mouseleave",()=>pause=false);

  setInterval(()=>{
    if(pause) return;

    el.scrollTop+=1;

    if(el.scrollTop+el.clientHeight>=el.scrollHeight){
      el.scrollTop=0;
    }

  },30);
}

/* CLOCK */
function updateClock(){
  const now=new Date();
  const jam=now.toLocaleTimeString("id-ID");
  const tanggal=now.toLocaleDateString("id-ID",{day:"2-digit",month:"short",year:"numeric"});
  document.getElementById("clock").innerText=tanggal+" | "+jam;
}
setInterval(updateClock,1000);
updateClock();

/* TIMER SYNC */
let duration = 15;
let timeLeft = duration;

setInterval(()=>{
  if(!dataReady) return;

  timeLeft--;
  document.getElementById("timer").innerText = timeLeft;

  if(timeLeft <= 0){
    location.reload();
  }

},1000);

</script>

</body>
</html>
